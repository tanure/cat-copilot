name: Publish CatPilot to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to publish (example: v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "No tag provided or detected."
            exit 1
          fi

          git fetch --tags --force

          if ! git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag '${TAG}' does not exist in the repository. Create/push the tag first."
            exit 1
          fi

          if [[ ! "${TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Tag '${TAG}' is not valid semantic versioning. Use tags like v1.2.3 or v1.2.3-beta.1"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using release tag: ${TAG}"
          echo "Resolved npm version: ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync package version from tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"

          node -e "const fs=require('fs'); const p='package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');" "$VERSION"

          echo "package.json version set to $VERSION"
          cat package.json

      - name: Validate package CLI entry
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "bin/catpilot.js" ]]; then
            echo "Required CLI file missing: bin/catpilot.js"
            exit 1
          fi

          BIN_PATH=$(node -p "const p=require('./package.json'); p.bin && p.bin.catpilot ? p.bin.catpilot : ''")
          if [[ "${BIN_PATH}" != "bin/catpilot.js" ]]; then
            echo "Invalid package.json bin.catpilot value: '${BIN_PATH}'. Expected 'bin/catpilot.js'."
            exit 1
          fi

          echo "CLI entry validation passed."

      - name: Validate npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NPM_TOKEN secret is missing. Add it in GitHub repository secrets."
            exit 1
          fi

          NPM_USER=$(npm whoami 2>/tmp/npm-whoami.err || true)
          if [[ -z "${NPM_USER}" ]]; then
            echo "npm authentication failed for NPM_TOKEN."
            cat /tmp/npm-whoami.err || true
            echo "Ensure token has read/write publish permissions for @alberttanure scope/package."
            exit 1
          fi

          echo "Authenticated npm user: ${NPM_USER}"

          PKG_NAME=$(node -p "require('./package.json').name")
          echo "Target package: ${PKG_NAME}"

          if [[ "${PKG_NAME}" != @alberttanure/* ]]; then
            echo "package.json name must be under @alberttanure scope for this pipeline."
            exit 1
          fi

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Generate release notes body
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"
          node scripts/generate-release-notes.mjs "$VERSION" > RELEASE_NOTES.md
          echo "Generated RELEASE_NOTES.md"
          cat RELEASE_NOTES.md

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
